<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Exemplo visual da área de comprovantes</title>
  <desc id="desc">Exemplo mostrando cards pequenos de comprovantes de imagem e PDF, observação e botão de adicionar.</desc>
  <defs>
    <style>
      .bg { fill: #03181c; }
      .panel { fill: #073d45; stroke: #2a6872; stroke-width: 2; }
      .card { fill: #052f35; stroke: #5398a4; stroke-width: 1.6; }
      .card-soft { fill: #0b464f; stroke: #3f7882; stroke-width: 1.5; }
      .field { fill: #052f35; }
      .text { fill: #f4fbfd; }
      .muted { fill: #d8f2fa; }
      .sky { fill: #9ddbef; }
      .label { fill: #9ddbef; font-size: 15px; font-weight: 900; letter-spacing: .06em; text-transform: uppercase; }
      .title { fill: #f4fbfd; font-size: 31px; font-weight: 900; }
      .body { fill: #d8f2fa; font-size: 17px; }
      .small { fill: #d8f2fa; font-size: 15px; }
      .accent { fill: #f46b12; }
      .accent-text { fill: #082529; font-weight: 900; }
      text { font-family: Inter, Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="960" height="560"/>
  <rect class="panel" x="46" y="42" width="872" height="476"/>

  <text class="label" x="84" y="90">Comprovantes</text>
  <text class="title" x="84" y="130">Anexos do lançamento</text>
  <text class="body" x="84" y="160">Use cards pequenos para conferir imagem, PDF e observação antes de abrir o arquivo.</text>

  <g transform="translate(84 202)">
    <rect class="card" width="250" height="244" rx="6"/>
    <rect width="250" height="152" rx="6" fill="#092a30"/>
    <rect x="28" y="28" width="194" height="96" rx="4" fill="#164f58"/>
    <circle cx="72" cy="82" r="26" fill="#f46b12"/>
    <path d="M112 110l42-48 54 72H46l38-44 28 20z" fill="#9ddbef"/>
    <rect x="18" y="170" width="214" height="1" fill="#2a6872"/>
    <text class="text" x="22" y="198" font-size="17" font-weight="800">comprovante-pix.png</text>
    <rect x="22" y="212" width="206" height="28" rx="4" fill="#073d45" stroke="#f46b12"/>
    <text x="68" y="231" fill="#ffcfbd" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="900">Abrir documento</text>
  </g>

  <g transform="translate(366 202)">
    <rect class="card" width="250" height="244" rx="6"/>
    <rect width="250" height="152" rx="6" fill="#092a30"/>
    <rect x="82" y="28" width="82" height="104" fill="#f4fbfd"/>
    <path d="M164 28v34h34" fill="#d9e5e7"/>
    <text x="98" y="92" fill="#f46b12" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">PDF</text>
    <rect x="18" y="170" width="214" height="1" fill="#2a6872"/>
    <text class="text" x="22" y="198" font-size="17" font-weight="800">recibo-inscricao.pdf</text>
    <rect x="22" y="212" width="206" height="28" rx="4" fill="#073d45" stroke="#f46b12"/>
    <text x="68" y="231" fill="#ffcfbd" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="900">Abrir documento</text>
  </g>

  <g transform="translate(650 202)">
    <rect class="field" width="234" height="98" rx="5"/>
    <text class="label" x="22" y="32">Observação</text>
    <text class="small" x="22" y="60">PIX enviado pelo</text>
    <text class="small" x="22" y="82">responsável.</text>

    <rect class="accent" y="128" width="234" height="48" rx="4"/>
    <text class="accent-text" x="48" y="158" font-family="Inter, Arial, sans-serif" font-size="14">Adicionar anexo</text>

    <rect class="card-soft" y="204" width="234" height="40" rx="5"/>
    <text class="small" x="22" y="229">Imagem ou PDF, ate 2MB.</text>
  </g>
</svg>
